<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Travel OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* Travel OS — design tokens and base styles */

:root {
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;

  /* Things-3-ish warm, soft, spacious */
  --bg: #f6f1e8;
  --bg-raised: #fbf7ef;
  --bg-sunken: #efe9de;
  --surface: #ffffff;
  --surface-2: #fbf7ef;
  --ink: #2a2620;
  --ink-2: #5a5147;
  --ink-3: #8a8172;
  --ink-4: #b8afa0;
  --divider: rgba(42, 38, 32, 0.08);
  --divider-strong: rgba(42, 38, 32, 0.14);

  --accent: oklch(62% 0.15 50);      /* warm burnt orange */
  --accent-soft: oklch(92% 0.04 60);
  --accent-ink: oklch(35% 0.1 50);

  --cat-family: oklch(58% 0.11 240);
  --cat-race: oklch(68% 0.15 70);
  --cat-couple: oklch(55% 0.1 150);
  --cat-solo: oklch(55% 0.1 320);
  --cat-work: oklch(50% 0.04 260);
  --cat-friends: oklch(60% 0.12 20);

  --stage-dreaming: oklch(72% 0.04 280);
  --stage-planning: oklch(68% 0.09 55);
  --stage-booked:   oklch(58% 0.11 150);
  --stage-upcoming: oklch(60% 0.16 35);
  --stage-active:   oklch(55% 0.2 20);
  --stage-archived: oklch(60% 0.02 80);

  --shadow-sm: 0 1px 2px rgba(42, 38, 32, 0.05), 0 1px 0 rgba(255,255,255,0.6) inset;
  --shadow-md: 0 2px 4px rgba(42,38,32,0.04), 0 8px 24px rgba(42,38,32,0.06);
  --shadow-lg: 0 4px 8px rgba(42,38,32,0.06), 0 24px 60px rgba(42,38,32,0.10);

  --font-display: 'Instrument Serif', 'Times New Roman', serif;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;

  --density: 1; /* 0.85 compact, 1 normal, 1.15 spacious */
}

[data-theme="dark"] {
  --bg: #1a1814;
  --bg-raised: #201d18;
  --bg-sunken: #141210;
  --surface: #24201b;
  --surface-2: #2a2620;
  --ink: #f0ebe0;
  --ink-2: #c4bdaf;
  --ink-3: #8a8172;
  --ink-4: #605749;
  --divider: rgba(240, 235, 224, 0.08);
  --divider-strong: rgba(240, 235, 224, 0.14);

  --accent: oklch(72% 0.15 55);
  --accent-soft: oklch(30% 0.06 55);
  --accent-ink: oklch(85% 0.08 55);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
  --shadow-md: 0 2px 4px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 8px rgba(0,0,0,0.3), 0 24px 60px rgba(0,0,0,0.5);

  --stage-dreaming: oklch(75% 0.04 280);
  --stage-planning: oklch(75% 0.12 60);
  --stage-booked:   oklch(70% 0.13 150);
  --stage-upcoming: oklch(72% 0.16 40);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#root {
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::selection {
  background: var(--accent-soft);
  color: var(--accent-ink);
}

/* ================================================================ */
/* App shell                                                         */
/* ================================================================ */

.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-sunken);
  border-right: 1px solid var(--divider);
  padding: 22px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 20px;
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 20px;
  font-style: italic;
  font-weight: 400;
  line-height: 1;
}
.brand-name {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: -0.01em;
  font-weight: 400;
}
.brand-name em {
  font-style: italic;
  color: var(--ink-3);
  font-weight: 400;
}

.nav-section {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 16px 10px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 8px;
  color: var(--ink-2);
  width: 100%;
  text-align: left;
  font-size: 13.5px;
  transition: background 120ms ease, color 120ms ease;
}
.nav-item:hover { background: var(--divider); color: var(--ink); }
.nav-item.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
.nav-item .count {
  margin-left: auto;
  font-size: 11.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.nav-item .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor; opacity: 0.7;
}

.sidebar-footer {
  margin-top: auto;
  padding: 14px 10px 6px;
  border-top: 1px solid var(--divider);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  color: var(--ink-2);
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent);
  color: white;
  display: grid; place-items: center;
  font-weight: 600;
  font-size: 12px;
}

/* Main area */
.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 36px 6px;
}
.topbar .spacer { flex: 1; }
.topbar h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 32px;
  margin: 0;
  letter-spacing: -0.01em;
}
.topbar h1 em { font-style: italic; color: var(--ink-3); font-weight: 400; }
.topbar .subtitle {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 2px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--divider);
  box-shadow: var(--shadow-sm);
  transition: transform 80ms ease, background 120ms ease;
}
.btn:hover { background: var(--bg-raised); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn.primary:hover { background: #000; }
[data-theme="dark"] .btn.primary { background: var(--accent); color: #1a1814; border-color: var(--accent); }
[data-theme="dark"] .btn.primary:hover { filter: brightness(1.05); }

.btn.ghost { background: transparent; border-color: transparent; box-shadow: none; }
.btn.ghost:hover { background: var(--divider); }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--ink-2);
  transition: background 120ms ease, color 120ms ease;
}
.icon-btn:hover { background: var(--divider); color: var(--ink); }

.search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 999px;
  padding: 6px 12px;
  min-width: 280px;
  box-shadow: var(--shadow-sm);
}
.search input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-size: 13px;
}

/* ================================================================ */
/* Dashboard                                                         */
/* ================================================================ */

.dashboard { padding: 10px 36px 60px; }

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin: 18px 0 24px;
}

.metric {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--radius-lg);
  padding: 18px 18px 16px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.metric .label {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.metric .value {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 400;
  line-height: 1.05;
  margin-top: 4px;
  letter-spacing: -0.01em;
}
.metric .value em { font-style: italic; color: var(--ink-3); }
.metric .hint {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 6px;
}
.metric .suffix {
  font-size: 14px;
  color: var(--ink-3);
  margin-left: 4px;
  font-family: var(--font-ui);
}

.metric .spark {
  position: absolute;
  right: 12px; top: 12px;
  opacity: 0.5;
}

.metric.pop .value { color: var(--accent); }

/* Year timeline (novel touch) */
.year-ribbon {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--radius-lg);
  padding: 14px 18px 16px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.year-ribbon-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px;
}
.year-ribbon-head h3 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
}
.ribbon {
  position: relative;
  height: 52px;
  border-radius: 8px;
  background: linear-gradient(to right, transparent calc(var(--today) * 1%), var(--divider) calc(var(--today) * 1%));
  background-color: var(--bg-sunken);
  overflow: visible;
}
.ribbon-months {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--ink-3);
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}
.ribbon-trip {
  position: absolute;
  top: 10px;
  height: 26px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 11px;
  font-weight: 500;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
  transition: transform 120ms ease, filter 120ms ease;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
.ribbon-trip:hover { transform: translateY(-1px); filter: brightness(1.05); }
.ribbon-today {
  position: absolute;
  top: 0; bottom: 28px;
  width: 1.5px;
  background: var(--accent);
  z-index: 2;
}
.ribbon-today::before {
  content: '';
  position: absolute;
  top: -3px; left: -3px;
  width: 7.5px; height: 7.5px; border-radius: 50%;
  background: var(--accent);
}
.ribbon-today-label {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* Pipeline */
.pipeline-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.pipeline-head h3 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.pipeline-head h3 em { font-style: italic; color: var(--ink-3); }

.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: transparent;
  color: var(--ink-2);
  border: 1px solid var(--divider);
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 120ms ease;
}
.chip:hover { background: var(--divider); }
.chip.on {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.chip .sw { width: 8px; height: 8px; border-radius: 50%; }

.pipeline {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.column {
  background: var(--bg-sunken);
  border-radius: var(--radius-lg);
  padding: 12px;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 140ms ease, box-shadow 140ms ease;
}
.column.drop-target {
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 1.5px var(--accent);
}

.column-head {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 4px 2px;
}
.column-head .stage-dot {
  width: 9px; height: 9px; border-radius: 50%;
}
.column-head .name {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--ink);
}
.column-head .count {
  font-size: 12px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.column-head .add {
  margin-left: auto;
  width: 22px; height: 22px;
  border-radius: 6px;
  display: grid; place-items: center;
  color: var(--ink-3);
}
.column-head .add:hover { background: var(--divider); color: var(--ink); }

/* Trip card */
.tcard {
  background: var(--surface);
  border-radius: 12px;
  padding: 0;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  cursor: grab;
  transition: transform 140ms ease, box-shadow 140ms ease;
  border: 1px solid var(--divider);
  user-select: none;
}
.tcard:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.tcard:active { cursor: grabbing; }
.tcard.dragging { opacity: 0.4; }

.tcard-cover {
  height: 72px;
  position: relative;
  overflow: hidden;
}
.tcard-cover .label {
  position: absolute;
  bottom: 6px; left: 8px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.tcard-body { padding: 10px 12px 12px; }
.tcard-dest {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.tcard-region {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 1px;
}
.tcard-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
  font-size: 11.5px;
  color: var(--ink-2);
  flex-wrap: wrap;
}
.tcard-meta .sep { color: var(--ink-4); }
.tcard-cats {
  display: flex; gap: 4px;
  margin-top: 8px;
}
.cat-pip {
  width: 8px; height: 8px; border-radius: 50%;
}
.cat-chip {
  display: inline-flex;
  align-items: center; gap: 5px;
  font-size: 10.5px;
  color: var(--ink-2);
  padding: 2px 7px 2px 6px;
  border-radius: 999px;
  background: var(--bg-sunken);
}

.tcard-progress {
  height: 3px;
  background: var(--divider);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 10px;
}
.tcard-progress .bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}
.tcard-avatars {
  display: flex;
  margin-left: auto;
}
.tcard-avatars .av {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-size: 10px;
  font-weight: 600;
  border: 1.5px solid var(--surface);
  margin-left: -6px;
}
.tcard-avatars .av:first-child { margin-left: 0; }

.tcard-countdown {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.tcard-approx {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--ink-3);
  font-size: 13px;
}

/* Insights strip */
.insights {
  margin-top: 28px;
}
.insights h3 {
  margin: 0 0 10px;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
}
.insights h3 em { font-style: italic; color: var(--ink-3); }
.insights-scroller {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.insight {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  box-shadow: var(--shadow-sm);
  display: flex;
  gap: 10px;
}
.insight .sev {
  width: 4px;
  border-radius: 2px;
  flex-shrink: 0;
}
.insight.urgent .sev { background: oklch(60% 0.18 25); }
.insight.warning .sev { background: oklch(72% 0.15 70); }
.insight.info .sev { background: oklch(72% 0.08 240); }
.insight .body { flex: 1; }
.insight .t { font-weight: 500; font-size: 13px; }
.insight .b { font-size: 12px; color: var(--ink-3); margin-top: 2px; line-height: 1.45; }
.insight .x {
  align-self: flex-start;
  opacity: 0.5;
  padding: 2px;
  border-radius: 4px;
}
.insight .x:hover { opacity: 1; background: var(--divider); }

/* ================================================================ */
/* Trip detail                                                       */
/* ================================================================ */

.trip-detail { padding-bottom: 60px; }

.trip-hero {
  padding: 32px 36px 24px;
  position: relative;
  overflow: hidden;
}
.trip-hero-bg {
  position: absolute; inset: 0;
  opacity: 0.9;
  z-index: 0;
}
.trip-hero-content {
  position: relative;
  z-index: 1;
  color: white;
}
.trip-hero .back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 18px;
  padding: 4px 10px 4px 6px;
  border-radius: 999px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
}
.trip-hero .back:hover { background: rgba(0,0,0,0.35); }

.trip-hero-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.trip-hero h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 68px;
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin: 0;
  color: white;
}
.trip-hero h1 em { font-style: italic; color: rgba(255,255,255,0.85); }
.trip-hero .sub {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  margin-top: 8px;
  display: flex; align-items: center; gap: 10px;
}
.trip-hero .countdown {
  text-align: right;
}
.trip-hero .countdown .n {
  font-family: var(--font-display);
  font-size: 60px;
  line-height: 1;
  font-style: italic;
}
.trip-hero .countdown .u {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.trip-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--divider);
  margin: -32px 36px 0;
  position: relative;
  z-index: 3;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.trip-stat {
  padding: 18px 22px;
  border-right: 1px solid var(--divider);
}
.trip-stat:last-child { border-right: none; }
.trip-stat .l {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  font-weight: 500;
}
.trip-stat .v {
  font-family: var(--font-display);
  font-size: 26px;
  margin-top: 4px;
  line-height: 1.1;
}
.trip-stat .v em { font-style: italic; color: var(--ink-3); font-size: 18px; }
.trip-stat.status .v { font-size: 20px; }
.trip-stat .progressbar {
  height: 4px;
  background: var(--divider);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.trip-stat .progressbar .f {
  height: 100%;

/* Calendar view */

.cal-grid {

const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

const STAGES = [
  { key: 'dreaming', label: 'Dreaming' },
  { key: 'planning', label: 'Planning' },
  { key: 'booked', label: 'Booked' },
  { key: 'upcoming', label: 'Upcoming' },
];

const CATEGORIES = [
  { key: 'family', label: 'Family', color: 'var(--cat-family)' },
  { key: 'couple', label: 'Couple', color: 'var(--cat-couple)' },
  { key: 'solo', label: 'Solo', color: 'var(--cat-solo)' },
  { key: 'race', label: 'Race', color: 'var(--cat-race)' },
  { key: 'friends', label: 'Friends', color: 'var(--cat-friends)' },
  { key: 'work', label: 'Work', color: 'var(--cat-work)' },
];

const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));

const fmtDate = (d, opts = { month: 'short', day: 'numeric' }) => {
  if (!d) return null;
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', opts);
};

const fmtDateRange = (start, end) => {
  if (!start) return null;
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const sameMonth = s.getMonth() === e.getMonth();
  const sameYear = s.getFullYear() === e.getFullYear();
  const opts = { month: 'short', day: 'numeric' };
  const sStr = s.toLocaleDateString('en-US', opts);
  const eStr = sameMonth
    ? e.getDate()
    : e.toLocaleDateString('en-US', opts);
  const yr = sameYear ? s.getFullYear() : `${s.getFullYear()}–${e.getFullYear()}`;
  return `${sStr} – ${eStr}, ${yr}`;
};

const daysBetween = (from, to) => {
  const f = from instanceof Date ? from : new Date(from + 'T00:00:00');
  const t = to instanceof Date ? to : new Date(to + 'T00:00:00');
  return Math.round((t - f) / (1000 * 60 * 60 * 24));
};

const fmtMoney = (n, c = 'USD') => {
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
};

const fmtTime = (t) => t;

// Cover gradient for a trip based on hue
function coverStyle(cover) {
  const h = cover?.hue ?? 30;
  return {
    background: `linear-gradient(135deg,
      oklch(52% 0.14 ${h}) 0%,
      oklch(42% 0.12 ${h + 25}) 50%,
      oklch(32% 0.08 ${h - 20}) 100%)`,
  };
}

// Avatars stack
function Avatars({ ids, max = 4 }) {
  const { TRAVELERS } = window.TravelOSData;
  const items = ids.map(id => TRAVELERS.find(t => t.id === id)).filter(Boolean);
  const shown = items.slice(0, max);
  const hidden = items.length - shown.length;
  return (
    <div className="tcard-avatars">
      {shown.map(p => (
        <div key={p.id} className="av" title={p.name}>{p.initials}</div>
      ))}
      {hidden > 0 && <div className="av" style={{ background: 'var(--ink-3)' }}>+{hidden}</div>}
    </div>
  );
}

// Category chips/pips
function CategoryPips({ cats }) {
  return (
    <div className="tcard-cats">
      {cats.map(k => (
        <span key={k} className="cat-chip" title={CAT_MAP[k]?.label}>
          <span className="cat-pip" style={{ background: CAT_MAP[k]?.color }} />
          {CAT_MAP[k]?.label}
        </span>
      ))}
    </div>
  );
}

// Stage dot
function StageDot({ stage }) {
  return <span className="stage-dot" style={{ background: `var(--stage-${stage})` }} />;
}

  ChevronLeft: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M9 3L5 7l4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  ChevronRight: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M5 3l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  Close: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  Check: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M3 7l3 3 5-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  Clock: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><circle cx="7" cy="7" r="5.25" stroke="currentColor" strokeWidth="1.25"/><path d="M7 4v3l2 1.5" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round"/></svg>,
  Map: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M1 3l4-1 4 1 4-1v9l-4 1-4-1-4 1V3z" stroke="currentColor" strokeWidth="1.25" strokeLinejoin="round"/><path d="M5 2v10M9 3v10" stroke="currentColor" strokeWidth="1.25"/></svg>,
  Calendar: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><rect x="1.75" y="2.5" width="10.5" height="9.5" rx="1.5" stroke="currentColor" strokeWidth="1.25"/><path d="M1.75 5.5h10.5M4.5 1.5v2M9.5 1.5v2" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round"/></svg>,
  Archive: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M1.5 3.5h11v2h-11zM2.5 5.5v6h9v-6M5.5 8h3" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  Pipeline: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><rect x="1.5" y="2" width="3" height="10" rx="0.75" stroke="currentColor" strokeWidth="1.25"/><rect x="5.5" y="2" width="3" height="7" rx="0.75" stroke="currentColor" strokeWidth="1.25"/><rect x="9.5" y="2" width="3" height="4" rx="0.75" stroke="currentColor" strokeWidth="1.25"/></svg>,
  Sun: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><circle cx="7" cy="7" r="2.5" stroke="currentColor" strokeWidth="1.25"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.75 2.75l1 1M10.25 10.25l1 1M2.75 11.25l1-1M10.25 3.75l1-1" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round"/></svg>,
  Moon: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M11.5 8.5a5 5 0 1 1-6-6 4 4 0 0 0 6 6z" stroke="currentColor" strokeWidth="1.25" strokeLinejoin="round"/></svg>,
  Sliders: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M2 4h10M2 10h10" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round"/><circle cx="5" cy="4" r="1.5" fill="var(--surface)" stroke="currentColor" strokeWidth="1.25"/><circle cx="9" cy="10" r="1.5" fill="var(--surface)" stroke="currentColor" strokeWidth="1.25"/></svg>,
  Sparkle: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M7 1l1.5 4L12 6.5 8.5 8 7 12 5.5 8 2 6.5 5.5 5 7 1z" stroke="currentColor" strokeWidth="1.25" strokeLinejoin="round"/></svg>,

  Car: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M1.5 9v-1l1-3h9l1 3v1M1.5 9h11v1.5h-11zM3 10.5v1M11 10.5v1" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  Cutlery: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><path d="M4 1v5.5c0 .5-1 1-1 1v5M9 1v4.5M11 1v12M5 1H3v5.5c0 .5 1 1 1 1" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/></svg>,

  MoreH: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><circle cx="3" cy="7" r="1" fill="currentColor"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="11" cy="7" r="1" fill="currentColor"/></svg>,
  Settings: (p) => <svg width="14" height="14" viewBox="0 0 14 14" fill="none" {...p}><circle cx="7" cy="7" r="2" stroke="currentColor" strokeWidth="1.25"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2M3 3l1.5 1.5M9.5 9.5l1.5 1.5M3 11l1.5-1.5M9.5 4.5L11 3" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round"/></svg>,

const BOOKING_ICONS = {

Object.assign(window, {

<script type="text/babel">
// Trip card + pipeline components
const { TRIPS: _tripsRef, TODAY: _todayRef } = window.TravelOSData || {};

function TripCard({ trip, onClick, onDragStart, onDragEnd, isDragging }) {
  const { TODAY } = window.TravelOSData;
  const today = TODAY;

  let countdown = null;
  let range = null;
  if (trip.start_date) {
    const days = daysBetween(today, trip.start_date);
    if (days > 0 && days <= 60) countdown = `in ${days}d`;
    else if (days > 60) countdown = `in ${Math.floor(days / 7)}w`;
    else if (days === 0) countdown = 'today';
    else if (days < 0 && daysBetween(today, trip.end_date) >= 0) countdown = 'active';
    range = fmtDateRange(trip.start_date, trip.end_date);
  }

  const budgetPct = trip.budget_total > 0 ? Math.min(100, (trip.budget_spent / trip.budget_total) * 100) : 0;

  return (
    <div
      className={`tcard${isDragging ? ' dragging' : ''}`}
      draggable
      onDragStart={(e) => onDragStart(e, trip)}
      onDragEnd={onDragEnd}
      onClick={onClick}
    >
      <div className="tcard-cover" style={coverStyle(trip.cover)}>
        <div className="label">{trip.cover?.label}</div>
      </div>
      <div className="tcard-body">
        <div className="tcard-dest">{trip.destination}</div>
        <div className="tcard-region">{trip.region}, {trip.country}</div>

        <div className="tcard-meta">
          {trip.date_approx && !range ? (
            <span className="tcard-approx">{trip.date_approx}</span>
          ) : range ? (
            <span>{range}</span>
          ) : null}
          {countdown && <><span className="sep">·</span><span className="tcard-countdown">{countdown}</span></>}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', marginTop: 10 }}>
          <div style={{ display: 'flex', gap: 4 }}>
            {trip.categories.map(k => (
              <span key={k} className="cat-pip" style={{ background: CAT_MAP[k]?.color }} title={CAT_MAP[k]?.label}/>
            ))}
          </div>
          <Avatars ids={trip.travelers} />
        </div>

        {(trip.stage === 'booked' || trip.stage === 'upcoming') && trip.budget_total > 0 && (
          <div className="tcard-progress" title={`${fmtMoney(trip.budget_spent)} of ${fmtMoney(trip.budget_total)}`}>
            <div className="bar" style={{ width: budgetPct + '%' }}/>
          </div>
        )}
      </div>
    </div>
  );
}

function Pipeline({ trips, onOpen, onMove, categoryFilter }) {
  const [dragTrip, setDragTrip] = useState(null);
  const [dropStage, setDropStage] = useState(null);

  const filtered = categoryFilter.length
    ? trips.filter(t => t.categories.some(c => categoryFilter.includes(c)))
    : trips;

  const byStage = useMemo(() => {
    const m = {};
    STAGES.forEach(s => m[s.key] = []);
    filtered.forEach(t => {
      if (m[t.stage]) m[t.stage].push(t);
    });
    // sort by start date within each column
    Object.keys(m).forEach(k => {
      m[k].sort((a, b) => {
        if (!a.start_date) return 1;
        if (!b.start_date) return -1;
        return a.start_date.localeCompare(b.start_date);
      });
    });
    return m;
  }, [filtered]);

  const onDragStart = (e, t) => {
    setDragTrip(t);
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragEnd = () => {
    setDragTrip(null);
    setDropStage(null);
  };
  const onDragOver = (e, stage) => {
    e.preventDefault();
    if (stage !== dropStage) setDropStage(stage);
  };
  const onDragLeave = (stage) => {
    if (stage === dropStage) setDropStage(null);
  };
  const onDrop = (e, stage) => {
    e.preventDefault();
    if (dragTrip && dragTrip.stage !== stage) {
      onMove(dragTrip.id, stage);
    }
    setDragTrip(null);
    setDropStage(null);
  };

  return (
    <div className="pipeline">
      {STAGES.map(stage => (
        <div
          key={stage.key}
          className={`column${dropStage === stage.key && dragTrip?.stage !== stage.key ? ' drop-target' : ''}`}
          onDragOver={(e) => onDragOver(e, stage.key)}
          onDragLeave={() => onDragLeave(stage.key)}
          onDrop={(e) => onDrop(e, stage.key)}
        >
          <div className="column-head">
            <StageDot stage={stage.key} />
            <span className="name">{stage.label}</span>
            <span className="count">{byStage[stage.key].length}</span>
            <button className="add" title="Add trip in this stage"><Icon.Plus/></button>
          </div>
          {byStage[stage.key].map(t => (
            <TripCard
              key={t.id}
              trip={t}
              onClick={() => onOpen(t.id)}
              onDragStart={onDragStart}
              onDragEnd={onDragEnd}
              isDragging={dragTrip?.id === t.id}
            />
          ))}
          {byStage[stage.key].length === 0 && (
            <div style={{ fontSize: 12, color: 'var(--ink-4)', padding: '20px 8px', textAlign: 'center', fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 15 }}>
              nothing here yet
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// Year ribbon — a timeline of trips across this year
function YearRibbon({ trips, onOpen }) {
  const { TODAY } = window.TravelOSData;
  const year = TODAY.getFullYear();
  const start = new Date(year, 0, 1);
  const end = new Date(year, 11, 31);
  const total = daysBetween(start, end);
  const todayPct = (daysBetween(start, TODAY) / total) * 100;

  const bars = trips
    .filter(t => t.start_date && t.end_date)
    .filter(t => {
      const s = new Date(t.start_date + 'T00:00:00');
      const e = new Date(t.end_date + 'T00:00:00');
      return e >= start && s <= end;
    })
    .map(t => {
      const s = new Date(t.start_date + 'T00:00:00');
      const e = new Date(t.end_date + 'T00:00:00');
      const left = Math.max(0, (daysBetween(start, s) / total) * 100);
      const width = Math.max(1.2, (daysBetween(s, e) / total) * 100);
      return { t, left, width };
    })
    .sort((a, b) => a.left - b.left);

  // Two rows for overlap avoidance
  const rows = [[], []];
  bars.forEach(b => {
    let placed = false;
    for (let r = 0; r < rows.length; r++) {
      const row = rows[r];
      const conflict = row.some(x => !(b.left + b.width < x.left || x.left + x.width < b.left));
      if (!conflict) { row.push(b); b.row = r; placed = true; break; }
    }
    if (!placed) { b.row = 0; rows[0].push(b); }
  });

  return (
    <div className="year-ribbon">
      <div className="year-ribbon-head">
        <h3>{year} <em>· year at a glance</em></h3>
        <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>{bars.length} trips across 12 months</div>
      </div>
      <div className="ribbon" style={{ ['--today']: todayPct.toFixed(1) }}>
        {bars.map(({ t, left, width, row }) => (
          <div
            key={t.id}
            className="ribbon-trip"
            style={{
              left: left + '%',
              width: width + '%',
              top: row === 0 ? 6 : 20,
              background: `oklch(48% 0.14 ${t.cover?.hue || 30})`,
            }}
            onClick={() => onOpen(t.id)}
            title={`${t.destination} · ${fmtDateRange(t.start_date, t.end_date)}`}
          >
            {t.destination}
          </div>
        ))}
        <div className="ribbon-today" style={{ left: todayPct + '%' }}>
          <div className="ribbon-today-label">Today</div>
        </div>
      </div>
      <div className="ribbon-months">
        {['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map(m => <span key={m}>{m}</span>)}
      </div>
    </div>
  );
}

// Metrics row
function Metrics({ trips }) {
  const { TODAY } = window.TravelOSData;
  const upcoming = trips
    .filter(t => t.start_date && daysBetween(TODAY, t.start_date) >= 0)
    .sort((a, b) => a.start_date.localeCompare(b.start_date));
  const next = upcoming[0];
  const nextDays = next ? daysBetween(TODAY, next.start_date) : null;

  const active = trips.filter(t => ['planning', 'booked', 'upcoming'].includes(t.stage)).length;

  const thisYear = TODAY.getFullYear();
  const ytdTrips = trips.filter(t => {
    if (!t.start_date) return false;
    return new Date(t.start_date + 'T00:00:00').getFullYear() === thisYear;
  });
  const ytdSpend = ytdTrips.reduce((s, t) => s + (t.budget_spent || 0), 0);
  const annualBudget = 30000;
  const ytdPct = Math.min(100, (ytdSpend / annualBudget) * 100);

  const totalTrips = trips.filter(t => t.stage !== 'archived').length;

  return (
    <div className="metrics">
      <div className="metric pop">
        <div className="label">Next trip</div>
        {next ? (
          <>
            <div className="value">{nextDays}<span className="suffix">{nextDays === 1 ? 'day' : 'days'}</span></div>
            <div className="hint">{next.destination} · {fmtDate(next.start_date)}</div>
          </>
        ) : (
          <><div className="value"><em>—</em></div><div className="hint">nothing booked</div></>
        )}
      </div>
      <div className="metric">
        <div className="label">Active plans</div>
        <div className="value">{active}</div>
        <div className="hint">across Planning, Booked, Upcoming</div>
      </div>
      <div className="metric">
        <div className="label">{thisYear} spend</div>
        <div className="value">{fmtMoney(ytdSpend)}<span className="suffix">/ {fmtMoney(annualBudget)}</span></div>
        <div className="hint" style={{ marginTop: 8 }}>
          <div style={{ height: 4, background: 'var(--bg-sunken)', borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ width: ytdPct + '%', height: '100%', background: 'var(--accent)' }}/>
          </div>
          <div style={{ marginTop: 4 }}>{ytdPct.toFixed(0)}% of annual</div>
        </div>
      </div>
      <div className="metric">
        <div className="label">Trips in motion</div>
        <div className="value">{totalTrips}</div>
        <div className="hint">{trips.filter(t => t.stage === 'dreaming').length} dreaming · {trips.filter(t => t.stage === 'archived').length} archived</div>
      </div>
    </div>
  );
}

Object.assign(window, { TripCard, Pipeline, YearRibbon, Metrics });

</script>

<script type="text/babel">
// Trip detail view with tabs
function TripDetail({ tripId, onBack, onUpdateTrip, onTogglePacked, onToggleBookingStatus }) {
  const { TRIPS, TRIP_DETAILS, TODAY, TRAVELERS } = window.TravelOSData;
  const trip = TRIPS.find(t => t.id === tripId);
  const detail = TRIP_DETAILS[tripId] || {
    itinerary: [], bookings: [], budget_breakdown: [], packing: [], documents: []
  };

  const [tab, setTab] = useState(() => localStorage.getItem('travelos:tab:' + tripId) || 'overview');
  useEffect(() => { localStorage.setItem('travelos:tab:' + tripId, tab); }, [tab, tripId]);

  if (!trip) return <div style={{ padding: 40 }}>Trip not found.</div>;

  const travelers = trip.travelers.map(id => TRAVELERS.find(t => t.id === id)).filter(Boolean);

  // Distance stub (varies by country)

    'Germany': '3,980 mi · ~8h flight',
    'Mexico': '2,400 mi · ~6h flight',

  const statusLabels = {
    dreaming: 'Capturing',
    planning: 'In progress',
    booked: 'On track',
    upcoming: 'Prep mode',

    archived: 'Archived',

  const tabs = [

    { key: 'packing', label: 'Packing', num: detail.packing ? `${detail.packing.filter(p => p.packed).length}/${detail.packing.length}` : null },

  return (

                <span style={{ opacity: 0.9 }}>{trip.region}, {trip.country}</span>

                <span>{trip.date_approx || fmtDateRange(trip.start_date, trip.end_date)}</span>
                <span style={{ opacity: 0.5 }}>·</span>
                <span style={{
                  background: 'rgba(255,255,255,0.2)',
                  padding: '3px 10px',
                  borderRadius: 999,
                  fontSize: 11.5,
                  textTransform: 'uppercase',
                  letterSpacing: '0.08em',
                  fontWeight: 600,
                }}>

            </div>
            {countdown !== null && countdown >= 0 && countdown <= 365 && (
              <div className="countdown">
                <div className="n">{countdown}</div>
                <div className="u">{countdown === 1 ? 'day to go' : 'days to go'}</div>

        <div className="trip-stat">
          <div className="l">Distance</div>
          <div className="v">{distances[trip.country] || '—'}</div>
        </div>
        <div className="trip-stat">
          <div className="l">Budget</div>
          <div className="v">
            {fmtMoney(trip.budget_spent)} <em>/ {fmtMoney(trip.budget_total)}</em>
          </div>
          <div className="progressbar"><div className="f" style={{ width: Math.min(100, (trip.budget_spent / trip.budget_total) * 100) + '%' }}/></div>
        </div>
        <div className="trip-stat">
          <div className="l">Travelers</div>
          <div className="v">{travelers.length} <em>· {travelers.map(t => t.name.split(' ')[0]).join(', ')}</em></div>
        </div>
        <div className="trip-stat status">
          <div className="l">Status</div>
          <div className="v" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <StageDot stage={trip.stage}/>

        </div>

      <div className="tabs">
        {tabs.map(t => (
          <button key={t.key} className={`tab${tab === t.key ? ' active' : ''}`} onClick={() => setTab(t.key)}>
            {t.label}
            {t.num != null && <span className="num">{t.num}</span>}
          </button>
        ))}
      </div>

      <div className="tab-content">
        {tab === 'overview' && <OverviewTab trip={trip} detail={detail} setTab={setTab}/>}
        {tab === 'itinerary' && <ItineraryTab itinerary={detail.itinerary}/>}
        {tab === 'bookings' && <BookingsTab bookings={detail.bookings} tripId={tripId} onToggle={onToggleBookingStatus}/>}
        {tab === 'budget' && <BudgetTab trip={trip} breakdown={detail.budget_breakdown}/>}
        {tab === 'packing' && <PackingTab items={detail.packing} tripId={tripId} onToggle={onTogglePacked}/>}
        {tab === 'documents' && <DocumentsTab docs={detail.documents}/>}
        {tab === 'notes' && <NotesTab trip={trip} onUpdate={onUpdateTrip}/>}

}

// BOOKINGS
function BookingsTab({ bookings, tripId, onToggle }) {
  const [filter, setFilter] = useState('all');
  const [catFilter, setCatFilter] = useState('all');

  if (!bookings || !bookings.length) {
    return <EmptyState title="No bookings yet" body="Track flights, hotels, and reservations as you book them." cta="Add booking"/>;
  }

  const filtered = bookings.filter(b =>
    (filter === 'all' || b.status === filter) &&
    (catFilter === 'all' || b.category === catFilter)
  );

  const counts = { all: bookings.length };
  ['flight','lodging','transport','activity','dining','other'].forEach(c => {
    counts[c] = bookings.filter(b => b.category === c).length;
  });

  const totalCost = bookings.reduce((s, b) => s + (b.cost || 0), 0);
  const doneCost = bookings.filter(b => b.status === 'done').reduce((s, b) => s + (b.cost || 0), 0);

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div className="booking-categories">
            <button className={`chip${catFilter === 'all' ? ' on' : ''}`} onClick={() => setCatFilter('all')}>All <span style={{ marginLeft: 4, opacity: 0.6 }}>{counts.all}</span></button>
            {Object.keys(BOOKING_ICONS).filter(c => counts[c] > 0).map(c => {
              const I = BOOKING_ICONS[c];
              return (
                <button key={c} className={`chip${catFilter === c ? ' on' : ''}`} onClick={() => setCatFilter(c)}>
                  <I/> {c.charAt(0).toUpperCase() + c.slice(1)} <span style={{ marginLeft: 2, opacity: 0.6 }}>{counts[c]}</span>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>
          {fmtMoney(doneCost)} paid · {fmtMoney(totalCost - doneCost)} pending
        </div>
      </div>

      <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
        {[['all','All'],['todo','To do'],['pending','Pending'],['done','Done']].map(([k,l]) => (
          <button key={k} className={`chip${filter === k ? ' on' : ''}`} onClick={() => setFilter(k)}>{l}</button>
        ))}
      </div>

      <div className="booking-table">
        {tripId === 'tr-lisbon' && filter === 'all' && catFilter === 'all' && (
          <div className="booking-row parsing-row">
            <div className="parse-dot"/>
            <div>
              <div className="booking-title">
                <span style={{ color: 'var(--ink-3)' }}><Icon.Plane/></span>
                <span style={{ fontStyle: 'italic', color: 'var(--ink-2)' }}>Parsing United confirmation…</span>
              </div>
              <div className="booking-sub">from Gmail · 2 minutes ago</div>
            </div>
            <div className="booking-vendor"><SourceChip source="gmail"/></div>
            <div className="booking-conf" style={{ color: 'var(--ink-4)' }}>pending</div>
            <div className="booking-cost" style={{ color: 'var(--ink-4)' }}>—</div>
            <div/>
          </div>
        )}
        {filtered.map((b, i) => {
          const Ico = BOOKING_ICONS[b.category] || Icon.MoreH;
          const nextStatus = b.status === 'todo' ? 'pending' : b.status === 'pending' ? 'done' : 'todo';
          return (
            <div key={i} className="booking-row">
              <button
                className={`booking-status ${b.status}`}
                onClick={() => onToggle(tripId, i, nextStatus)}
                title={`Mark as ${nextStatus}`}
              >
                {b.status === 'done' && <Icon.Check/>}
                {b.status === 'pending' && <Icon.Clock style={{ width: 10, height: 10 }}/>}
              </button>
              <div>
                <div className="booking-title" style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <span style={{ color: 'var(--ink-3)' }}><Ico/></span>
                  {b.title}
                </div>
                {b.notes && <div className="booking-sub">{b.notes}</div>}
                {b.travel_date && !b.notes && <div className="booking-sub">{fmtDate(b.travel_date, { month: 'short', day: 'numeric', year: 'numeric' })}</div>}
              </div>
              <div className="booking-vendor">
                {b.vendor}
                {b.source && <div style={{ marginTop: 2 }}><SourceChip source={b.source}/></div>}
              </div>
              <div className="booking-conf">{b.confirmation || '—'}</div>
              <div className="booking-cost">{b.cost > 0 ? fmtMoney(b.cost) : '—'}</div>
              <button className="icon-btn" style={{ width: 28, height: 28 }}><Icon.MoreH/></button>

// BUDGET
function BudgetTab({ trip, breakdown }) {
  const pct = Math.min(100, (trip.budget_spent / trip.budget_total) * 100);
  const perPerson = Math.round(trip.budget_total / trip.travelers.length);

  const rad = 78, cx = 90, cy = 90;
  const circ = 2 * Math.PI * rad;
  const offset = circ - (pct / 100) * circ;

  return (
    <div>
      <div className="budget-top">
        <div className="budget-big">
          <div className="l">Budget</div>
          <div className="big">{fmtMoney(trip.budget_spent)}</div>
          <div className="small">of {fmtMoney(trip.budget_total)} · {fmtMoney(perPerson)} per person</div>
          <div className="donut">
            <svg width="180" height="180" viewBox="0 0 180 180">
              <circle cx={cx} cy={cy} r={rad} fill="none" stroke="var(--bg-sunken)" strokeWidth="14"/>
              <circle cx={cx} cy={cy} r={rad} fill="none"
                stroke="var(--accent)" strokeWidth="14"
                strokeDasharray={circ}
                strokeDashoffset={offset}
                strokeLinecap="round"
                transform={`rotate(-90 ${cx} ${cy})`}
              />
              <text x={cx} y={cy - 4} textAnchor="middle" fontFamily="Instrument Serif" fontSize="32" fill="var(--ink)">
                {pct.toFixed(0)}%
              </text>
              <text x={cx} y={cy + 16} textAnchor="middle" fontSize="10" fill="var(--ink-3)" letterSpacing="1.5" style={{ textTransform: 'uppercase' }}>
                SPENT
              </text>
            </svg>
          </div>
        </div>

        <div className="budget-breakdown">
          <h3 style={{ margin: '0 0 12px', fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 22, letterSpacing: '-0.01em' }}>
            <em style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>Breakdown</em>
          </h3>
          {breakdown && breakdown.length ? breakdown.map((row, i) => {
            const rowPct = (row.spent / row.total) * 100;
            return (
              <div key={i} className="budget-row">
                <div className="cat">{row.category}</div>
                <div className="bar-wrap">
                  <div className="bar" style={{ width: Math.min(100, rowPct) + '%', background: rowPct > 100 ? 'oklch(60% 0.18 25)' : 'var(--accent)' }}/>
                </div>
                <div className="fig">{fmtMoney(row.spent)} <span style={{ color: 'var(--ink-4)' }}>/ {fmtMoney(row.total)}</span></div>
              </div>
            );
          }) : <div style={{ color: 'var(--ink-3)', fontSize: 13 }}>No categories yet.</div>}
        </div>
      </div>
    </div>
  );
}

// PACKING
function PackingTab({ items, tripId, onToggle }) {
  if (!items || !items.length) {
    return <EmptyState title="No packing list yet" body="Pick a template or start adding items." cta="Add from template"/>;
  }

  const grouped = {};
  items.forEach((it, idx) => {
    if (!grouped[it.category]) grouped[it.category] = [];
    grouped[it.category].push({ ...it, idx });
  });

  const catOrder = ['clothing', 'documents', 'electronics', 'toiletries', 'other'];
  const catLabels = {
    clothing: 'Clothing',
    documents: 'Documents',
    electronics: 'Electronics',
    toiletries: 'Toiletries',
    other: 'Other',
  };

  const packed = items.filter(i => i.packed).length;
  const total = items.length;

  return (
    <div>
      <div className="packing-head">
        <div>
          <h3 style={{ margin: 0, fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 26, letterSpacing: '-0.01em' }}>
            {packed} <em style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>of {total} packed</em>
          </h3>
          <div style={{ fontSize: 12.5, color: 'var(--ink-3)', marginTop: 2 }}>Check items off as you pack</div>
        </div>
        <div style={{ width: 180 }}>
          <div style={{ height: 6, background: 'var(--bg-sunken)', borderRadius: 3, overflow: 'hidden' }}>
            <div style={{ width: (packed / total * 100) + '%', height: '100%', background: 'var(--accent)' }}/>
          </div>
        </div>
      </div>

      <div className="packing-categories">
        {catOrder.filter(c => grouped[c]).map(c => (
          <div key={c} className="packing-cat">
            <h4>{catLabels[c]}</h4>
            {grouped[c].map(it => (
              <div
                key={it.idx}
                className={`packing-item${it.packed ? ' done' : ''}`}
                onClick={() => onToggle(tripId, it.idx)}
              >
                <span className="box">{it.packed && <Icon.Check style={{ width: 11, height: 11 }}/>}</span>
                <span className="name">{it.item}</span>
                {it.qty > 1 && <span className="qty">×{it.qty}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// DOCUMENTS
function DocumentsTab({ docs }) {
  const { TODAY } = window.TravelOSData;
  if (!docs || !docs.length) return <EmptyState title="No documents yet" body="Upload passports, tickets, and confirmations."/>;

    <div className="docs-grid">

          <div key={i} className="doc">
            <div style={{ fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{d.type}</div>
            <div className="t">{d.title}</div>
            {expiry && (
              <div className={`s${warn ? ' warn' : ''}`} style={{ fontStyle: warn ? 'italic' : 'normal' }}>
                {warn ? '⚠ ' : ''}Expires {expiry}

          </div>
        );
      })}

  );
}

<script type="text/babel">
// Calendar view, Archive view, Add Trip modal, Insights, Tweaks
function CalendarView({ trips, onOpen }) {
  const { TODAY } = window.TravelOSData;
  const [cursor, setCursor] = useState(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1));

  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const first = new Date(year, month, 1);
  const firstDow = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDow; i++) {
    const d = new Date(year, month, -firstDow + i + 1);
    cells.push({ date: d, dim: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    cells.push({ date: new Date(year, month, i), dim: false });
  }
  while (cells.length < 42) {
    const last = cells[cells.length - 1].date;
    const d = new Date(last);
    d.setDate(d.getDate() + 1);
    cells.push({ date: d, dim: true });
  }

  const tripsForCell = (d) => {
    return trips.filter(t => {
      if (!t.start_date || !t.end_date) return false;
      const s = new Date(t.start_date + 'T00:00:00');
      const e = new Date(t.end_date + 'T00:00:00');
      return d >= s && d <= e;
    });
  };

  const iso = (d) => d.toISOString().slice(0, 10);
  const todayIso = iso(TODAY);

  const goPrev = () => setCursor(new Date(year, month - 1, 1));
  const goNext = () => setCursor(new Date(year, month + 1, 1));

  return (
    <div className="calendar">
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, margin: '8px 0 20px' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 32, margin: 0, letterSpacing: '-0.01em' }}>
          {first.toLocaleDateString('en-US', { month: 'long' })} <em style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>{year}</em>
        </h2>
        <div style={{ display: 'flex', gap: 4 }}>
          <button className="icon-btn" onClick={goPrev}><Icon.ChevronLeft/></button>
          <button className="icon-btn" onClick={goNext}><Icon.ChevronRight/></button>
        </div>
        <button className="btn ghost" style={{ marginLeft: 8 }} onClick={() => setCursor(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1))}>Today</button>
      </div>

      <div className="cal-grid">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="cal-head">{d}</div>)}
        {cells.map((c, i) => {
          const dayTrips = tripsForCell(c.date);
          const isToday = iso(c.date) === todayIso;
          return (
            <div key={i} className={`cal-cell${c.dim ? ' dim' : ''}${isToday ? ' today' : ''}`}>
              <div className="cal-day">{c.date.getDate()}</div>
              {dayTrips.slice(0, 2).map(t => (
                <div key={t.id} className="cal-trip"
                  style={{ background: `oklch(48% 0.14 ${t.cover?.hue || 30})` }}
                  onClick={() => onOpen(t.id)}
                >{t.destination}</div>
              ))}
              {dayTrips.length > 2 && <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>+{dayTrips.length - 2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ArchiveView({ trips, onOpen }) {
  const archived = trips.filter(t => t.stage === 'archived')
    .sort((a, b) => (b.start_date || '').localeCompare(a.start_date || ''));

  const byYear = {};
  archived.forEach(t => {
    const y = new Date(t.start_date + 'T00:00:00').getFullYear();
    (byYear[y] = byYear[y] || []).push(t);
  });

  const allCountries = new Set(archived.map(t => t.country));
  const allDays = archived.reduce((s, t) => s + (t.nights || daysBetween(t.start_date, t.end_date)), 0);
  const totalSpend = archived.reduce((s, t) => s + (t.budget_spent || 0), 0);

  return (
    <div className="archive">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginTop: 16, marginBottom: 20 }}>
        <div className="metric">
          <div className="label">Lifetime trips</div>
          <div className="value">{archived.length}</div>
          <div className="hint">completed and logged</div>
        </div>
        <div className="metric">
          <div className="label">Countries</div>
          <div className="value">{allCountries.size}</div>
          <div className="hint">{[...allCountries].slice(0,3).join(', ')}{allCountries.size > 3 ? '…' : ''}</div>
        </div>
        <div className="metric">
          <div className="label">Days traveled</div>
          <div className="value">{allDays}</div>
          <div className="hint">across all archived trips</div>
        </div>
        <div className="metric">
          <div className="label">Lifetime spend</div>
          <div className="value">{fmtMoney(totalSpend)}</div>
          <div className="hint">avg {fmtMoney(totalSpend / archived.length)}/trip</div>
        </div>
      </div>

      {Object.keys(byYear).sort((a, b) => b.localeCompare(a)).map(y => {
        const yearTrips = byYear[y];
        const ySpend = yearTrips.reduce((s, t) => s + (t.budget_spent || 0), 0);
        const yDays = yearTrips.reduce((s, t) => s + (t.nights || 0), 0);
        return (
          <div key={y} className="archive-year">
            <div>
              <h2>{y}</h2>
              <div className="archive-year-stats">
                {yearTrips.length} {yearTrips.length === 1 ? 'trip' : 'trips'}<br/>
                {yDays} days<br/>
                {fmtMoney(ySpend)}
              </div>
            </div>
            <div className="archive-trips">
              {yearTrips.map(t => (
                <TripCard key={t.id} trip={t} onClick={() => onOpen(t.id)} onDragStart={() => {}} onDragEnd={() => {}}/>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Add Trip modal
function AddTripModal({ onClose, onAdd }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    destination: '',
    region: '',
    country: '',
    date_approx: '',
    start_date: '',
    end_date: '',
    categories: [],
    travelers: ['t1'],
    budget_total: '',
  });

  const { TRAVELERS } = window.TravelOSData;

  const toggleCat = (k) => {
    setData(d => ({
      ...d,
      categories: d.categories.includes(k) ? d.categories.filter(c => c !== k) : [...d.categories, k]
    }));
  };
  const toggleTrav = (id) => {
    setData(d => ({
      ...d,
      travelers: d.travelers.includes(id) ? d.travelers.filter(t => t !== id) : [...d.travelers, id]
    }));
  };

  const canProceed = () => {
    if (step === 0) return data.destination.trim() && data.country.trim();
    if (step === 1) return data.categories.length > 0 && data.travelers.length > 0;
    return true;
  };

  const submit = () => {
    const hue = [20, 180, 350, 260, 60, 110, 300][Math.floor(Math.random() * 7)];
    const trip = {
      id: 'tr-' + Math.random().toString(36).slice(2, 8),
      destination: data.destination.trim(),
      region: data.region.trim(),
      country: data.country.trim(),
      stage: 'dreaming',
      categories: data.categories,
      start_date: data.start_date || null,
      end_date: data.end_date || null,
      date_approx: data.date_approx || null,
      budget_total: Number(data.budget_total) || 0,
      budget_spent: 0,
      budget_currency: 'USD',
      travelers: data.travelers,
      cover: { hue, label: 'new·' + data.country.toLowerCase().slice(0, 4) },
      notes: '',
      nights: 0,
    };
    onAdd(trip);
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <h2>New trip <em>· {['the idea', 'who and what', 'first details'][step]}</em></h2>
            <button className="icon-btn" onClick={onClose}><Icon.Close/></button>
          </div>
          <div className="modal-steps">
            {[0,1,2].map(i => <div key={i} className={`s${i <= step ? ' on' : ''}`}/>)}
          </div>
        </div>

        <div className="modal-body">
          {step === 0 && <>
            <div className="field">
              <label>Destination</label>
              <input autoFocus value={data.destination} onChange={e => setData(d => ({ ...d, destination: e.target.value }))} placeholder="Kyoto, Patagonia, Lisbon…"/>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              <div className="field">
                <label>Region / venue</label>
                <input value={data.region} onChange={e => setData(d => ({ ...d, region: e.target.value }))} placeholder="Optional"/>
              </div>
              <div className="field">
                <label>Country</label>
                <input value={data.country} onChange={e => setData(d => ({ ...d, country: e.target.value }))} placeholder="Japan"/>
              </div>
            </div>
            <div className="field">
              <label>When? <span style={{ textTransform: 'none', color: 'var(--ink-4)', fontWeight: 400, letterSpacing: 0 }}>— exact dates or a vibe</span></label>
              <input value={data.date_approx} onChange={e => setData(d => ({ ...d, date_approx: e.target.value }))} placeholder="Spring 2027, or leave blank"/>
            </div>
          </>}

          {step === 1 && <>
            <div className="field">
              <label>Categories <span style={{ textTransform: 'none', color: 'var(--ink-4)', fontWeight: 400, letterSpacing: 0 }}>— pick any that apply</span></label>
              <div className="cat-pick">
                {CATEGORIES.map(c => (
                  <button key={c.key} className={`c${data.categories.includes(c.key) ? ' on' : ''}`} onClick={() => toggleCat(c.key)}>
                    <span className="cat-pip" style={{ background: c.color }}/>
                    {c.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="field">
              <label>Travelers</label>
              <div className="cat-pick">
                {TRAVELERS.map(t => (
                  <button key={t.id} className={`c${data.travelers.includes(t.id) ? ' on' : ''}`} onClick={() => toggleTrav(t.id)}>
                    {t.name}
                  </button>
                ))}
              </div>
            </div>
          </>}

          {step === 2 && <>
            <div className="field">
              <label>Rough budget <span style={{ textTransform: 'none', color: 'var(--ink-4)', fontWeight: 400, letterSpacing: 0 }}>— optional, USD</span></label>
              <input type="number" value={data.budget_total} onChange={e => setData(d => ({ ...d, budget_total: e.target.value }))} placeholder="8000"/>
            </div>
            <div style={{
              background: 'var(--bg-sunken)', padding: 16, borderRadius: 10, fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.6,
            }}>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, marginBottom: 4 }}>
                Great — we'll drop <em style={{ fontStyle: 'italic' }}>{data.destination || 'this trip'}</em> into Dreaming.
              </div>
              Add flights, lodging, itinerary later as things firm up. No rush.
            </div>
          </>}
        </div>

        <div className="modal-foot">
          <button className="btn ghost" onClick={step === 0 ? onClose : () => setStep(s => s - 1)}>
            {step === 0 ? 'Cancel' : '← Back'}
          </button>
          <button
            className="btn primary"
            disabled={!canProceed()}
            style={{ opacity: canProceed() ? 1 : 0.5 }}
            onClick={() => step < 2 ? setStep(s => s + 1) : submit()}
          >
            {step < 2 ? 'Next →' : 'Add trip'}
          </button>
        </div>
      </div>
    </div>
  );
}

        <div className="modal-foot">
          <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>Everything here is read-only or email-based. Your inbox stays yours.</span>
          <button className="btn primary" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { InboxView, IntegrationsModal, SourceChip, SOURCE_META });

</script>

<script type="text/babel">
// Main app — Travel OS
const { useState: uS, useEffect: uE, useMemo: uM } = React;

function App() {
  const { TRIPS, INSIGHTS: initialInsights, INBOX: initialInbox } = window.TravelOSData;

  // State
  const [trips, setTrips] = uS(TRIPS);
  const [tripDetails, setTripDetails] = uS(window.TravelOSData.TRIP_DETAILS);
  const [insights, setInsights] = uS(initialInsights);
  const [inbox, setInbox] = uS(initialInbox);
  const [showIntegrations, setShowIntegrations] = uS(false);
  const [view, setView] = uS(() => localStorage.getItem('travelos:view') || 'pipeline');
  const [openTripId, setOpenTripId] = uS(() => localStorage.getItem('travelos:openTrip') || null);
  const [showModal, setShowModal] = uS(false);
  const [search, setSearch] = uS('');
  const [categoryFilter, setCategoryFilter] = uS([]);

  // Theme + tweaks
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "orange",
    "density": "normal",
    "showInsights": true
  }/*EDITMODE-END*/;

  const [theme, setTheme] = uS(TWEAK_DEFAULTS.theme);
  const [accent, setAccent] = uS(TWEAK_DEFAULTS.accent);
  const [density, setDensity] = uS(TWEAK_DEFAULTS.density);
  const [showInsights, setShowInsights] = uS(TWEAK_DEFAULTS.showInsights);
  const [tweaksOpen, setTweaksOpen] = uS(false);

  uE(() => { localStorage.setItem('travelos:view', view); }, [view]);
  uE(() => {
    if (openTripId) localStorage.setItem('travelos:openTrip', openTripId);
    else localStorage.removeItem('travelos:openTrip');
  }, [openTripId]);

  uE(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  uE(() => {
    const accents = {
      orange: { val: 'oklch(62% 0.15 50)', soft: 'oklch(92% 0.04 60)', ink: 'oklch(35% 0.1 50)' },
      olive:  { val: 'oklch(55% 0.1 130)', soft: 'oklch(92% 0.03 130)', ink: 'oklch(32% 0.08 130)' },
      blue:   { val: 'oklch(55% 0.12 250)', soft: 'oklch(92% 0.04 250)', ink: 'oklch(32% 0.1 250)' },
      plum:   { val: 'oklch(55% 0.12 330)', soft: 'oklch(92% 0.04 330)', ink: 'oklch(32% 0.1 330)' },
      sand:   { val: 'oklch(55% 0.05 60)',  soft: 'oklch(92% 0.02 60)',  ink: 'oklch(32% 0.04 60)' },
    };
    const a = accents[accent] || accents.orange;
    document.documentElement.style.setProperty('--accent', a.val);
    document.documentElement.style.setProperty('--accent-soft', a.soft);
    document.documentElement.style.setProperty('--accent-ink', a.ink);
  }, [accent]);
  uE(() => {
    const m = { compact: '0.88', normal: '1', roomy: '1.15' };
    document.documentElement.style.fontSize = `${14 * Number(m[density] || 1)}px`;
  }, [density]);

  // Edit-mode integration (Tweaks toggle in the toolbar)
  uE(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persistTweaks = (patch) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  // Filtered trips by search
  const searched = uM(() => {
    if (!search) return trips;
    const q = search.toLowerCase();
    return trips.filter(t =>
      t.destination.toLowerCase().includes(q) ||
      t.country.toLowerCase().includes(q) ||
      (t.region || '').toLowerCase().includes(q)
    );
  }, [trips, search]);

  // Handlers
  const moveStage = (tripId, newStage) => {
    setTrips(ts => ts.map(t => t.id === tripId ? { ...t, stage: newStage } : t));
  };
  const updateTrip = (tripId, patch) => {
    setTrips(ts => ts.map(t => t.id === tripId ? { ...t, ...patch } : t));
  };
  const addTrip = (trip) => {
    setTrips(ts => [...ts, trip]);
  };
  const togglePacked = (tripId, idx) => {
    setTripDetails(d => ({
      ...d,
      [tripId]: {
        ...d[tripId],
        packing: d[tripId].packing.map((p, i) => i === idx ? { ...p, packed: !p.packed } : p)
      }
    }));
  };
  const toggleBookingStatus = (tripId, idx, newStatus) => {
    setTripDetails(d => ({
      ...d,
      [tripId]: {
        ...d[tripId],
        bookings: d[tripId].bookings.map((b, i) => i === idx ? { ...b, status: newStatus } : b)
      }
    }));
  };
  const dismissInsight = (id) => setInsights(ii => ii.filter(i => i.id !== id));
  const dismissInboxItem = (id) => setInbox(ii => ii.filter(i => i.id !== id));
  const assignInboxItem = (id, tripId) => {
    setInbox(ii => ii.filter(i => i.id !== id));
  };

  const toggleCategoryFilter = (k) => {
    setCategoryFilter(f => f.includes(k) ? f.filter(x => x !== k) : [...f, k]);
  };

  const openTrip = (id) => {
    setOpenTripId(id);
    setView('detail');
  };
  const backToPipeline = () => {
    setOpenTripId(null);
    setView('pipeline');
  };

  // If openTripId exists on load, ensure view is detail
  uE(() => {
    if (openTripId && view !== 'detail') {
      // keep whatever they had; but if view restored is not a known one, default
    }
    if (!openTripId && view === 'detail') {
      setView('pipeline');
    }
  }, []);

  const counts = uM(() => {
    const m = { pipeline: 0, calendar: 0, archive: 0 };
    trips.forEach(t => {
      if (t.stage !== 'archived') m.pipeline++;
      else m.archive++;
    });
    return m;
  }, [trips]);

  const activeTrip = trips.find(t => t.id === openTripId);

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark">T</div>
          <div className="brand-name">Travel<em>OS</em></div>
        </div>

        <div className="nav-section">Views</div>
        <button className={`nav-item${view === 'pipeline' ? ' active' : ''}`} onClick={() => { setView('pipeline'); setOpenTripId(null); }}>
          <Icon.Pipeline/> Pipeline <span className="count">{counts.pipeline}</span>
        </button>
        <button className={`nav-item${view === 'inbox' ? ' active' : ''}`} onClick={() => { setView('inbox'); setOpenTripId(null); }}>
          <Icon.Notes/> Inbox <span className="count">{inbox.length}</span>
        </button>
        <button className={`nav-item${view === 'calendar' ? ' active' : ''}`} onClick={() => { setView('calendar'); setOpenTripId(null); }}>
          <Icon.Calendar/> Calendar
        </button>
        <button className={`nav-item${view === 'archive' ? ' active' : ''}`} onClick={() => { setView('archive'); setOpenTripId(null); }}>
          <Icon.Archive/> Archive <span className="count">{counts.archive}</span>
        </button>

        <div className="nav-section">Categories</div>
        {CATEGORIES.map(c => {
          const n = trips.filter(t => t.categories.includes(c.key) && t.stage !== 'archived').length;
          if (n === 0) return null;
          return (
            <button key={c.key} className="nav-item" onClick={() => toggleCategoryFilter(c.key)}
              style={{ background: categoryFilter.includes(c.key) ? 'var(--divider)' : undefined }}>
              <span className="cat-pip" style={{ background: c.color, width: 10, height: 10 }}/>
              {c.label}
              <span className="count">{n}</span>
            </button>
          );
        })}

        <div className="nav-section">Tools</div>
        <button className="nav-item" onClick={() => setShowIntegrations(true)}>
          <Icon.Sparkle/> Integrations
        </button>
        <button className="nav-item" onClick={() => setTweaksOpen(v => !v)}>
          <Icon.Sliders/> Tweaks
        </button>
        <button className="nav-item">
          <Icon.Settings/> Settings
        </button>

        <div className="sidebar-footer">
          <div className="avatar">Q</div>
          <div>
            <div style={{ color: 'var(--ink)', fontWeight: 500, fontSize: 12.5 }}>Quincy</div>
            <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>Cherry Hill, NJ</div>
          </div>
        </div>
      </aside>

      <main className="main">
        {view !== 'detail' && (
          <div className="topbar">
            <div>
              {view === 'pipeline' && <>
                <h1>Good afternoon, Quincy<em>.</em></h1>
                <div className="subtitle">April 18, 2026 · {trips.filter(t => t.start_date && daysBetween(window.TravelOSData.TODAY, t.start_date) >= 0 && daysBetween(window.TravelOSData.TODAY, t.start_date) <= 30).length} trips within 30 days</div>
              </>}
              {view === 'inbox' && <>
                <h1>Inbox<em>.</em></h1>
                <div className="subtitle">Forwarded confirmations · {inbox.length} items</div>
              </>}
              {view === 'calendar' && <>
                <h1>Calendar<em>.</em></h1>
                <div className="subtitle">Everything in motion on one page</div>
              </>}
              {view === 'archive' && <>
                <h1>Archive<em>.</em></h1>
                <div className="subtitle">Every trip you've completed</div>
              </>}
            </div>
            <div className="spacer"/>
            <div className="search">
              <Icon.Search/>
              <input placeholder="Search destinations…" value={search} onChange={e => setSearch(e.target.value)}/>
            </div>
            <button className="btn primary" onClick={() => setShowModal(true)}>
              <Icon.Plus/> New trip
            </button>
          </div>
        )}

        {view === 'pipeline' && (
          <div className="dashboard">
            <Metrics trips={trips}/>
            <YearRibbon trips={trips.filter(t => t.stage !== 'archived')} onOpen={openTrip}/>

            <div className="pipeline-head">
              <h3>Pipeline <em>· {searched.filter(t => t.stage !== 'archived').length} trips in motion</em></h3>
              {categoryFilter.length > 0 && (
                <div className="filter-chips">
                  <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>Filter:</span>
                  {categoryFilter.map(k => (
                    <button key={k} className="chip on" onClick={() => toggleCategoryFilter(k)}>
                      <span className="sw" style={{ background: CAT_MAP[k].color }}/>
                      {CAT_MAP[k].label}
                      <Icon.Close style={{ width: 10, height: 10 }}/>
                    </button>
                  ))}
                  <button className="chip" onClick={() => setCategoryFilter([])}>Clear</button>
                </div>
              )}
            </div>

            <Pipeline
              trips={searched.filter(t => t.stage !== 'archived')}
              onOpen={openTrip}
              onMove={moveStage}
              categoryFilter={categoryFilter}
            />

            {showInsights && (
              <InsightsStrip insights={insights} onOpen={openTrip} onDismiss={dismissInsight}/>
            )}
          </div>
        )}

        {view === 'inbox' && (
          <div className="dashboard">
            <InboxView trips={trips} inbox={inbox} onAssign={assignInboxItem} onOpen={openTrip} onDismiss={dismissInboxItem}/>
          </div>
        )}

        {view === 'calendar' && <CalendarView trips={trips} onOpen={openTrip}/>}

        {view === 'archive' && <ArchiveView trips={trips} onOpen={openTrip}/>}

        {view === 'detail' && activeTrip && (
          <TripDetail
            tripId={openTripId}
            onBack={backToPipeline}
            onUpdateTrip={updateTrip}
            onTogglePacked={togglePacked}
            onToggleBookingStatus={toggleBookingStatus}
          />
        )}
      </main>

      {showModal && <AddTripModal onClose={() => setShowModal(false)} onAdd={addTrip}/>}
      {showIntegrations && <IntegrationsModal onClose={() => setShowIntegrations(false)}/>}
      {tweaksOpen && (
        <TweaksPanel
          theme={theme} setTheme={(v) => { setTheme(v); persistTweaks({ theme: v }); }}
          accent={accent} setAccent={(v) => { setAccent(v); persistTweaks({ accent: v }); }}
          density={density} setDensity={(v) => { setDensity(v); persistTweaks({ density: v }); }}
          onClose={() => setTweaksOpen(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
